[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
markers =
    page1: Page1
    page2: Page2
    page3: Page3
    page4: Page4
    functional: Functional
    performance: Performance
    compatibility: Compatibility
    compliance: Compliance
    TC01: TC01
    TC02: TC02
    TC03: TC03
    TC04: TC04
    TC05: TC05
    TC06: TC06
    TC07: TC07
    TC08: TC08
    TC09: TC09
    TC10: TC10
    TC11: TC11
    TC12: TC12
    TC13: TC13
    TC14: TC14
    TC15: TC15
    TC16: TC16
